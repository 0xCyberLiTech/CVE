# ──────────────────────────────────────────────────────────────────────────────
# nginx-nvd-proxy.conf — Proxy NVD avec injection de clé API
#
# Ce bloc nginx intercepte les requêtes vers /api/nvd/
# et injecte la clé API NVD côté serveur.
#
# Sécurité :
#   - La clé API n'est jamais exposée au navigateur
#   - Accessible uniquement depuis localhost (127.0.0.1)
#   - Le script cron interroge http://127.0.0.1/api/nvd/ → proxy transparent
#
# Installation :
#   1. Créer /etc/nginx/api-keys.conf avec la variable :
#        set $nvd_api_key "VOTRE_CLE_API_NVD";
#   2. Inclure ce bloc dans votre vhost nginx
#   3. nginx -t && systemctl reload nginx
#
# Obtenir une clé NVD (gratuit) :
#   https://nvd.nist.gov/developers/request-an-api-key
#   Avec clé : 50 req/30s  |  Sans clé : 5 req/30s
#
# Author : 0xCyberLiTech
# ──────────────────────────────────────────────────────────────────────────────

# Fichier de clé API — à créer manuellement, ne JAMAIS versionner
include /etc/nginx/api-keys.conf;

# Proxy vers l'API NVD — accessible uniquement depuis localhost
location /api/nvd/ {
    # Restriction localhost uniquement
    allow 127.0.0.1;
    deny all;

    # Proxy vers l'API NVD officielle
    proxy_pass https://services.nvd.nist.gov/rest/json/cves/2.0/;

    # Injection de la clé API (variable définie dans api-keys.conf)
    proxy_set_header apiKey $nvd_api_key;

    # Headers obligatoires
    proxy_set_header Host services.nvd.nist.gov;
    proxy_set_header User-Agent "CVE-Tracker/1.0";

    # Timeouts adaptés aux requêtes NVD (réponses > 2MB)
    proxy_connect_timeout 30s;
    proxy_read_timeout    120s;
    proxy_send_timeout    30s;

    # Pas de cache nginx (le cron gère lui-même la logique de cache)
    proxy_cache off;
    proxy_buffering on;
    proxy_buffer_size 256k;
    proxy_buffers 16 256k;

    # Supprimer les headers sensibles côté client
    proxy_hide_header Authorization;
    proxy_hide_header apiKey;
}
